name: iOS Build Capacitor Service

on:
  workflow_dispatch:
    inputs:
      repository_url:
        description: 'Your Capacitor app repository URL'
        required: true
        type: string
      
      repository_branch:
        description: 'Branch to build'
        required: false
        type: string
        default: 'main'
      
      is_private_repo:
        description: 'Is repository private?'
        required: true
        type: boolean
        default: true
      
      github_token:
        description: 'GitHub token (only for private repos)'
        required: false
        type: string

      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        type: string
        default: '1.0.0'
      
      build_number:
        description: 'Build number (Required)'
        required: false
        type: string
      
      target_platform:
        description: 'Target devices'
        required: true
        type: choice
        options:
          - iphone_and_ipad
          - iphone_only
          - ipad_only
        default: 'iphone_and_ipad'
      
      build_mode:
        description: 'What to do?'
        required: true
        type: choice
        options:
          - build_only
          - publish_to_appstore
        default: 'publish_to_appstore'
      
      npm_build_command:
        description: 'Build command'
        required: false
        type: string
        default: 'npm run build'
      
      apple_credentials:
        description: 'Apple credentials JSON (see README for format)'
        required: true
        type: string
      
      provisioning_profile_base64:
        description: 'iOS Provisioning profile (.mobileprovision base64)'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Parse Apple Credentials
        id: apple
        env:
          APPLE_CREDS: ${{ inputs.apple_credentials }}
        run: |
          echo "team_id=$(echo "$APPLE_CREDS" | jq -r '.team_id')" >> $GITHUB_OUTPUT
          echo "certificate_base64=$(echo "$APPLE_CREDS" | jq -r '.certificate_base64')" >> $GITHUB_OUTPUT
          echo "certificate_password=$(echo "$APPLE_CREDS" | jq -r '.certificate_password')" >> $GITHUB_OUTPUT
          echo "api_key_id=$(echo "$APPLE_CREDS" | jq -r '.api_key_id')" >> $GITHUB_OUTPUT
          echo "api_issuer_id=$(echo "$APPLE_CREDS" | jq -r '.api_issuer_id')" >> $GITHUB_OUTPUT
          echo "api_key_base64=$(echo "$APPLE_CREDS" | jq -r '.api_key_base64')" >> $GITHUB_OUTPUT
          
          echo "✅ Apple credentials parsed successfully"
      
      - name: Configure Git Credentials
        if: inputs.is_private_repo
        run: |
          git config --global url."https://${{ inputs.github_token }}@github.com/".insteadOf "https://github.com/"
          echo "✅ Git credentials pre-configured for private repo access"
      
      - name: Clone App Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository_url }}
          ref: ${{ inputs.repository_branch }}
          token: ${{ inputs.is_private_repo && inputs.github_token || github.token }}
          path: app
      
      - name: Read Capacitor Config
        id: capacitor
        working-directory: app
        run: |
          if [ -f "capacitor.config.json" ]; then
            echo "📖 Reading from capacitor.config.json"
            CONFIG_FILE="capacitor.config.json"
            IS_JSON=true
          elif [ -f "capacitor.config.ts" ]; then
            echo "📖 Reading from capacitor.config.ts"
            CONFIG_FILE="capacitor.config.ts"
            IS_JSON=false
          else
            echo "❌ Error: No capacitor.config.json or capacitor.config.ts found!"
            exit 1
          fi

          if [ "$IS_JSON" = true ]; then
            CONFIG_CONTENT=$(cat "$CONFIG_FILE")
            APP_NAME=$(echo "$CONFIG_CONTENT" | jq -r '.appName // empty')
            APP_ID=$(echo "$CONFIG_CONTENT" | jq -r '.appId // empty')
            WEB_DIR=$(echo "$CONFIG_CONTENT" | jq -r '.webDir // "www"')
          else
            APP_NAME=$(sed -n "s/.*appName:[[:space:]]*['\"]\\([^'\"]*\\)['\"].*/\\1/p" "$CONFIG_FILE" | head -1)
            APP_ID=$(sed -n "s/.*appId:[[:space:]]*['\"]\\([^'\"]*\\)['\"].*/\\1/p" "$CONFIG_FILE" | head -1)
            WEB_DIR=$(sed -n "s/.*webDir:[[:space:]]*['\"]\\([^'\"]*\\)['\"].*/\\1/p" "$CONFIG_FILE" | head -1)
            
            if [ -z "$WEB_DIR" ]; then
              WEB_DIR="www"
            fi
          fi

          if [ -z "$APP_NAME" ] || [ -z "$APP_ID" ]; then
            echo "❌ Error: 'appName' or 'appId' missing in config!"
            exit 1
          fi

          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "bundle_id=$APP_ID" >> $GITHUB_OUTPUT
          echo "web_dir=$WEB_DIR" >> $GITHUB_OUTPUT
          echo "✅ App: $APP_NAME ($APP_ID)"
          echo "📂 Web Dir: $WEB_DIR"
      
      - name: Detect Node Version
        id: node_version
        working-directory: app
        run: |
          echo "🔍 Detecting required Node.js version..."
          if [ -f "package.json" ]; then
            CAP_VER=$(jq -r '.dependencies["@capacitor/core"] // .devDependencies["@capacitor/core"] // empty' package.json)
            
            if [ -z "$CAP_VER" ]; then
              echo "⚠️ Could not find @capacitor/core in package.json. Defaulting to Node 20."
              NODE_VER="20"
              MAJOR_VER="8"
            else
              echo "Found @capacitor/core: $CAP_VER"
              MAJOR_VER=$(echo "$CAP_VER" | sed 's/[^0-9.]//g' | cut -d. -f1)
              
              if [ "$MAJOR_VER" -ge 8 ]; then
                echo "⚡ Capacitor 8+ detected. Using Node 22."
                NODE_VER="22"
              elif [ "$MAJOR_VER" -eq 7 ] || [ "$MAJOR_VER" -eq 6 ]; then
                echo "⚡ Capacitor 6/7 detected. Using Node 20."
                NODE_VER="20"
              elif [ "$MAJOR_VER" -le 5 ]; then
                echo "⚡ Capacitor 5 or older detected. Using Node 18."
                NODE_VER="18"
                MAJOR_VER="5"
              else
                echo "⚠️ Unknown version. Defaulting to Node 20."
                NODE_VER="20"
                MAJOR_VER="8"
              fi
            fi
          else
            echo "⚠️ No package.json found. Defaulting to Node 20."
            NODE_VER="20"
            MAJOR_VER="8"
          fi
          
          echo "version=$NODE_VER" >> $GITHUB_OUTPUT
          echo "capacitor_major=$MAJOR_VER" >> $GITHUB_OUTPUT
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node_version.outputs.version }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      
      - name: Install Dependencies
        working-directory: app
        run: npm ci
      
      - name: Build Web App
        working-directory: app
        run: ${{ inputs.npm_build_command }}
      
      - name: Sync Capacitor iOS
        working-directory: app
        run: |
          WEB_DIR="${{ steps.capacitor.outputs.web_dir }}"
          echo "🔍 Checking web directory: $WEB_DIR"

          if [ ! -d "$WEB_DIR" ]; then
            echo "ℹ️ Directory '$WEB_DIR' does not exist. Checking for build output..."
            
            if [ -d "dist" ]; then
              echo "✅ Found 'dist'. Moving to '$WEB_DIR'..."
              mv dist "$WEB_DIR"
            elif [ -d "build" ]; then
              echo "✅ Found 'build'. Moving to '$WEB_DIR'..."
              mv build "$WEB_DIR"
            elif [ -d "public" ]; then
              echo "✅ Found 'public'. Moving to '$WEB_DIR'..."
              mv public "$WEB_DIR"
            else
              echo "❌ Could not find build output (dist, build, public). Validation failed."
              ls -F
              exit 1
            fi
          else
            echo "✅ Web directory '$WEB_DIR' found."
          fi

          if [ ! -d "ios" ]; then
            echo "📦 Adding iOS platform..."
            npx cap add ios --skip-pod-install
          fi

          echo "📦 Copying web assets..."
          npx cap copy ios

          echo "✅ Capacitor iOS files synced"
      
      - name: Setup Ruby & Fastlane
        run: |
          gem install fastlane
          gem install cocoapods
      
      - name: Setup xcodeproj gem
        run: gem install xcodeproj
      
      - name: Update iOS Deployment Target
        working-directory: app/ios/App
        env:
          CAP_MAJOR: ${{ steps.node_version.outputs.capacitor_major }}
        run: |
          if [ "$CAP_MAJOR" -ge 6 ]; then
            IOS_TARGET="15.0"
          elif [ "$CAP_MAJOR" -eq 5 ]; then
            IOS_TARGET="13.0"
          else
            IOS_TARGET="15.0"
          fi
          
          echo "🔧 Capacitor $CAP_MAJOR detected. Setting iOS deployment target to $IOS_TARGET..."
          
          if [ -f "Podfile" ]; then
            echo "  📝 Updating Podfile platform to iOS $IOS_TARGET..."
            sed -i.bak "s/platform :ios, '[0-9.]*'/platform :ios, '$IOS_TARGET'/g" Podfile
            rm -f Podfile.bak
            grep "platform :ios" Podfile || echo "  ⚠️ Could not find platform line"
          fi
          
          echo "  📝 Updating Xcode project deployment target..."
          ruby -e "
          require 'xcodeproj'
          
          ios_target = '$IOS_TARGET'
          project_path = 'App.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          
          project.build_configurations.each do |config|
            config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = ios_target
            puts \"  ✅ Updated project config: #{config.name}\"
          end
          
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = ios_target
            end
            puts \"  ✅ Updated target: #{target.name}\"
          end
          
          project.save
          puts \"✅ Xcode project updated to iOS #{ios_target} deployment target\"
          "
          
          echo "  🔄 Running pod install to update Pods..."
          pod install
          
          echo "✅ iOS deployment target updated to $IOS_TARGET"
      
      - name: Disable Code Signing for Pods
        if: inputs.build_mode == 'publish_to_appstore'
        working-directory: app/ios/App
        run: |
          if [ ! -d "Pods/Pods.xcodeproj" ]; then
            echo "⚠️ Pods.xcodeproj not found, skipping"
            exit 0
          fi
          
          ruby -e '
          require "xcodeproj"
          project = Xcodeproj::Project.open("Pods/Pods.xcodeproj")
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings["CODE_SIGN_IDENTITY"] = ""
              config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"
              config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"
              config.build_settings["CODE_SIGN_STYLE"] = "Manual"
            end
          end
          project.save
          puts "✅ Disabled code signing for #{project.targets.count} Pod targets"
          '
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Import Certificate
        env:
          CERTIFICATE_BASE64: ${{ steps.apple.outputs.certificate_base64 }}
          CERTIFICATE_PASSWORD: ${{ steps.apple.outputs.certificate_password }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          echo "$CERTIFICATE_BASE64" | base64 --decode > $CERT_PATH
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          
          echo "📋 Certificates in keychain:"
          security find-identity -v -p basic $KEYCHAIN_PATH
          
          security list-keychain -d user -s $KEYCHAIN_PATH
      
      - name: Import iOS Provisioning Profile
        id: provision
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "${{ inputs.provisioning_profile_base64 }}" | base64 --decode > $PP_PATH
          
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          echo "Found iOS Profile UUID: $UUID"
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          
          echo "uuid=$UUID" >> $GITHUB_OUTPUT
      
      - name: Update App Info
        working-directory: app/ios/App
        run: |
          if [ -n "${{ inputs.build_number }}" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ inputs.build_number }}" App/Info.plist
          fi
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.version }}" App/Info.plist
      
      - name: Set App Display Name
        working-directory: app
        run: |
          echo "📛 Setting app display name from Capacitor config..."
          
          APP_NAME="${{ steps.capacitor.outputs.app_name }}"
          echo "  App Name: $APP_NAME"
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" ios/App/App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $APP_NAME" ios/App/App/Info.plist
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleName $APP_NAME" ios/App/App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleName string $APP_NAME" ios/App/App/Info.plist
          
          echo "✅ App display name set to: $APP_NAME"
      
      - name: Configure Target Platform
        working-directory: app/ios/App
        run: |
          case "${{ inputs.target_platform }}" in
            "iphone_only")
              DEVICES="1"
              ;;
            "ipad_only")
              DEVICES="2"
              ;;
            *)
              DEVICES="1,2"
              ;;
          esac
          
          TEAM_ID="${{ steps.apple.outputs.team_id }}"
          APP_NAME_SAFE=$(echo "${{ steps.capacitor.outputs.app_name }}" | tr ' ' '-')
          
          echo "TARGET_DEVICES=$DEVICES" >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "APP_NAME_SAFE=$APP_NAME_SAFE" >> $GITHUB_ENV
          echo "📱 Building for: ${{ inputs.target_platform }} (devices: $DEVICES)"
      
      - name: Disable Automatic Signing for App Store
        if: inputs.build_mode == 'publish_to_appstore'
        working-directory: app/ios/App
        env:
          PROFILE_UUID: ${{ steps.provision.outputs.uuid }}
        run: |
          echo "🔧 Disabling Automatic Signing for App Store build..."
          ruby -e '
          require "xcodeproj"
          project = Xcodeproj::Project.open("App.xcodeproj")
          target = project.targets.find { |t| t.name == "App" }
          target.build_configurations.each do |config|
            config.build_settings["CODE_SIGN_STYLE"] = "Manual"
            config.build_settings["PROVISIONING_PROFILE"] = ENV["PROFILE_UUID"]
            config.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ""
            puts "  - Set profile #{ENV["PROFILE_UUID"]} for #{config.name}"
          end
          project.save
          '
      
      - name: Build App
        working-directory: app/ios/App
        run: |
          if [ -d "App.xcworkspace" ]; then
            echo "✅ Found App.xcworkspace. Using Workspace build."
            FL_ARG="workspace:App.xcworkspace"
          elif [ -d "App.xcodeproj" ]; then
            echo "ℹ️ App.xcworkspace not found. Using App.xcodeproj build."
            FL_ARG="project:App.xcodeproj"
          else
            echo "❌ Error: Neither App.xcworkspace nor App.xcodeproj found in $(pwd)"
            ls -la
            exit 1
          fi

          if [ "${{ inputs.build_mode }}" == "build_only" ]; then
            echo "🔨 Building iOS Simulator app..."
            xcodebuild \
              -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -destination "generic/platform=iOS Simulator" \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
            
            APP_PATH=$(find build -name "*.app" -type d | head -1)
            cp -R "$APP_PATH" "./${APP_NAME_SAFE}.app"
            zip -r "${APP_NAME_SAFE}.app.zip" "${APP_NAME_SAFE}.app"
            echo "✅ Built iOS Simulator app"
          else
            TEAM_ID="${{ steps.apple.outputs.team_id }}"
            XCARGS="DEVELOPMENT_TEAM=$TEAM_ID CODE_SIGN_IDENTITY='Apple Distribution' CODE_SIGNING_REQUIRED=YES CODE_SIGNING_ALLOWED=YES"
            
            echo "📱 Building iOS App for App Store..."
            fastlane run build_app \
              $FL_ARG \
              scheme:"App" \
              export_method:"app-store" \
              output_directory:"." \
              output_name:"${APP_NAME_SAFE}-iOS.ipa" \
              export_team_id:"$TEAM_ID" \
              xcargs:"$XCARGS" \
              clean:true
          fi
      
      - name: Upload to App Store
        if: inputs.build_mode == 'publish_to_appstore'
        working-directory: app/ios/App
        run: |
          API_KEY_CONTENT=$(echo "${{ steps.apple.outputs.api_key_base64 }}" | base64 --decode)
          
          BUNDLE_ID="${{ steps.capacitor.outputs.bundle_id }}"
          TEAM_ID="${{ steps.apple.outputs.team_id }}"
          
          echo "📦 Setting up App Store Connect API key..."
          
          API_KEY_PATH="$RUNNER_TEMP/api_key.json"
          
          jq -n \
            --arg key_id "${{ steps.apple.outputs.api_key_id }}" \
            --arg issuer_id "${{ steps.apple.outputs.api_issuer_id }}" \
            --arg key "$API_KEY_CONTENT" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false}' > "$API_KEY_PATH"
          
          echo "✅ API key JSON created at: $API_KEY_PATH"
          
          if [ -f "${APP_NAME_SAFE}-iOS.ipa" ]; then
            echo "📱 Uploading iOS IPA: ${APP_NAME_SAFE}-iOS.ipa"
            fastlane run upload_to_app_store \
              api_key_path:"$API_KEY_PATH" \
              app_identifier:"$BUNDLE_ID" \
              team_id:"$TEAM_ID" \
              ipa:"${APP_NAME_SAFE}-iOS.ipa" \
              platform:"ios" \
              skip_metadata:true \
              skip_screenshots:true \
              run_precheck_before_submit:false \
              submit_for_review:false
          else
            echo "❌ iOS IPA not found!"
            ls -la
            exit 1
          fi
      
      - name: Upload Simulator Artifact
        if: inputs.build_mode == 'build_only'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.capacitor.outputs.app_name }}-${{ inputs.target_platform }}-Simulator-${{ inputs.version }}
          path: app/ios/App/${{ env.APP_NAME_SAFE }}.app.zip
          retention-days: 30
      
      - name: Build Summary
        run: |
          echo "## ✅ iOS Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "**App:** ${{ steps.capacitor.outputs.app_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bundle ID:** ${{ steps.capacitor.outputs.bundle_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** ${{ inputs.target_platform }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.build_mode }}" == "build_only" ]; then
            echo "📦 Download .app from Artifacts (for Simulator)" >> $GITHUB_STEP_SUMMARY
          else
            echo "🚀 Uploaded to App Store Connect" >> $GITHUB_STEP_SUMMARY
            echo "📱 Test via **TestFlight** on your real device" >> $GITHUB_STEP_SUMMARY
          fi
